services:
  # ── PostgreSQL database ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: fernos-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: fernos
      POSTGRES_USER: fernos_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-fernos_pass}
    ports:
      - "5433:5432"
    volumes:
      - fernos-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U fernos_user -d fernos" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - fernos-net

  # ── Manager Spring Boot application ─────────────────────────────
  manager:
    build:
      context: .
      dockerfile: manager-node/Dockerfile
    container_name: fernos-manager
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/fernos?sslMode=verify-full
      SPRING_DATASOURCE_USERNAME: fernos_user
      SPRING_DATASOURCE_PASSWORD: fernos_pass
      MANAGER_SECURITY_JWT_SECRET: ${JWT_SECRET}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-admin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-password123}
      MINIO_BUCKET: ${MINIO_BUCKET:-fernos-storage}
    ports:
      - "8080:8080"
      - "9090:9090"
    networks:
      - fernos-net

  # ── Worker nodes (scale with: docker compose up --scale worker=N) ─
  worker:
    build:
      context: .
      dockerfile: worker-node/Dockerfile
    restart: unless-stopped
    depends_on:
      manager:
        condition: service_healthy
    environment:
      MANAGER_HOST: manager
      MANAGER_PORT: "9090"
      MANAGER_HTTP_PORT: "8080"
      WORKER_AUTH_TOKEN: ${WORKER_AUTH_TOKEN:-}

      WORKER_DEV_MODE: "true"
      MANAGER_SECURITY_JWT_SECRET: ${JWT_SECRET}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-admin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-password123}
      MINIO_BUCKET: ${MINIO_BUCKET:-fernos-storage}
    deploy:
      replicas: 4
    networks:
      - fernos-net

  # ── React Dashboard (Nginx) ─────────────────────────────────────
  dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    container_name: fernos-dashboard
    restart: unless-stopped
    depends_on:
      manager:
        condition: service_healthy
    ports:
      - "80:80"
    networks:
      - fernos-net

  # ── MinIO Object Storage ─────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: fernos-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-password123}
    volumes:
      - minio-data:/data
    networks:
      - fernos-net
    command: server /data --console-address ":9001"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO Setup (auto-create bucket) ─────────────────────────────
  minio-setup:
    image: minio/mc:latest
    container_name: fernos-minio-setup
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - fernos-net
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-password123}
      MINIO_BUCKET: ${MINIO_BUCKET:-fernos-storage}
    entrypoint: >
      /bin/sh -c " /usr/bin/mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD}; /usr/bin/mc mb --ignore-existing local/$${MINIO_BUCKET}; /usr/bin/mc policy set public local/$${MINIO_BUCKET}; exit 0; "

volumes:
  fernos-data:
  minio-data:


networks:
  fernos-net:
    driver: bridge
