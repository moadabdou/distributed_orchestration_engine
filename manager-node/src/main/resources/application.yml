server:
  port: 8080

  tcp:
    port: 9090

spring:
  datasource:
    # MUST DEFINE DB_HOST IN ENVIRONMENT VARIABLES FOR DOCKER COMPOSE 
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/fernos
    username: root
    password: root
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
        hibernate:
          dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
