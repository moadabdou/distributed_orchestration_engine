server:
  port: 8080

  tcp:
    port: 9090

spring:
  datasource:
    # MUST DEFINE DB_HOST IN ENVIRONMENT VARIABLES FOR DOCKER COMPOSE 
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/fernos
    username: root
    password: root
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
        hibernate:
          dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

manager:
  security:
    jwt:
      secret: "3c34e62a26514757c2c159851f50a80d46dddc7fa0a06df5c689f928e4e9b94z"
  worker:
    default-max-capacity: 4

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: fern-os

# ─── Logging Configuration ──────────────────────────────────────────
# ─── DAG Workflow Scheduler ───────────────────────────────────────────
doe:
  workflow:
    scheduler-interval-ms: 1000     # how often DagScheduler polls for ready jobs
    fail-fast: true                 # if one job fails, fail the whole workflow immediately
    max-concurrent-jobs-per-workflow: 10  # limit parallelism per workflow
    recovery-mode: PAUSED_ON_RESTART      # PAUSED_ON_RESTART or RESUME_AUTO

logging:
  level:
    root: INFO
    com.doe: INFO
    org.springframework.web: INFO
    org.hibernate.SQL: WARN

---
spring:
  config:
    activate:
      on-profile: dev

logging:
  level:
    root: INFO
    com.doe: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: WARN
