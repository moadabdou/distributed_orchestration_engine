server:
  port: 8080

  tcp:
    port: 9090

spring:
  datasource:
    # MUST DEFINE DB_HOST IN ENVIRONMENT VARIABLES FOR DOCKER COMPOSE 
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/fernos
    username: root
    password: root
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
        hibernate:
          dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

manager:
  security:
    jwt:
      secret: "3c34e62a26514757c2c159851f50a80d46dddc7fa0a06df5c689f928e4e9b94z"
  worker:
    default-max-capacity: 4
