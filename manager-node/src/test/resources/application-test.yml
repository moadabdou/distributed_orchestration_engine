server:
  port: 0

  tcp:
    port: 0

spring:
  flyway:
    enabled: true
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/fernos
    username: root
    password: root
    driver-class-name: org.postgresql.Driver

doe:
  workflow:
    scheduler-interval-ms: 100
    max-concurrent-jobs-per-workflow: 10
