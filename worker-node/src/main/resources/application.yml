# MinIO Configuration for Worker Node
doe:
  storage:
    minio:
      endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
      access-key: ${MINIO_ACCESS_KEY:admin}
      secret-key: ${MINIO_SECRET_KEY:password123}
      bucket: ${MINIO_BUCKET:fernos-storage}
  worker:
    heartbeat-interval-ms: ${WORKER_HEARTBEAT_INTERVAL_MS:5000}
    read-timeout-ms: ${WORKER_READ_TIMEOUT_MS:1200000} # 20 minutes, to accommodate long-running tasks

